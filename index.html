<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 MarketHub - Marketplace Santa Rosa</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f2744 100%);
            color: #e0e7ff;
        }
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        #root {
            min-height: 100vh;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Send, X, LogOut, Plus, LogIn } = window.lucide;

        const Marketplace = () => {
                }
            });

            const [produtos, setProdutos] = useState(JSON.parse(localStorage.getItem('produtos')) || [
                {
                    id: 1001,
                    nome: '🍽️ Marmita Teste',
                    preco_anuncio: 45,
                    preco_minimo: 35,
                    emoji: '🍽️',
                    categoria: 'Viandas',
                    vendedorNome: '🧪 Teste Completo',
                    visualizacoes: 23,
                    status: 'ativo'
                }
            ]);

            const fazerLogin = () => {
                const user = usuarios[loginEmail];
                if (user && user.senha === loginSenha) {
                    setUsuarioLogado(user);
                    setTela('inicio');
                    setLoginEmail('');
                    setLoginSenha('');
                } else {
                    alert('Email ou senha incorretos!');
                }
            };

            const sairLogin = () => {
                setUsuarioLogado(null);
                setTela('login');
            };

            if (!usuarioLogado) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 flex items-center justify-center p-4">
                        <div className="bg-slate-900/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-8 max-w-md w-full shadow-2xl">
                            <h1 className="text-4xl font-black mb-2 text-center bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                                💎 MarketHub
                            </h1>
                            <p className="text-center text-purple-300 mb-8">Marketplace Santa Rosa/RS</p>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-cyan-400 mb-2">Email</label>
                                    <input
                                        type="email"
                                        value={loginEmail}
                                        onChange={(e) => setLoginEmail(e.target.value)}
                                        placeholder="teste@test.com"
                                        className="w-full px-4 py-3 bg-slate-800 border border-cyan-400/30 rounded-lg text-white placeholder-purple-400 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-bold text-cyan-400 mb-2">Senha</label>
                                    <input
                                        type="password"
                                        value={loginSenha}
                                        onChange={(e) => setLoginSenha(e.target.value)}
                                        placeholder="123"
                                        className="w-full px-4 py-3 bg-slate-800 border border-cyan-400/30 rounded-lg text-white placeholder-purple-400 focus:outline-none focus:ring-2 focus:ring-cyan-500"
                                    />
                                </div>

                                <button
                                    onClick={fazerLogin}
                                    className="w-full bg-gradient-to-r from-cyan-600 to-purple-600 hover:from-cyan-500 hover:to-purple-500 text-white font-bold py-3 rounded-lg transition-all duration-300"
                                >
                                    Entrar
                                </button>
                            </div>

                                <p className="text-xs text-blue-200">Senha: <strong>123</strong></p>
                            </div>
                        </div>
                    </div>
                );

                                >
                                    Sair
                                </button>
                            </div>

                                    🛍️ Bem-vindo ao MarketHub!
                                </h2>
                                
                                <div className="bg-gradient-to-r from-purple-500/20 to-cyan-500/20 border-2 border-purple-400 rounded-xl p-6 mb-8">
                                    <h3 className="text-2xl font-bold text-cyan-300 mb-3">🧪 Você está usando a conta de TESTE</h3>

                                        <li>✅ Editar produtos</li>
                                        <li>✅ Testar viandas</li>
                                        <li>✅ Testar redução 1% ao dia</li>
                                        <li>✅ Testar combos</li>

                                        <li>✅ Testar frete grátis</li>

                                    </ul>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-slate-900/80 border border-cyan-400/30 rounded-xl p-6">
                                        <h3 className="text-xl font-bold text-cyan-400 mb-2">📦 Meus Produtos</h3>
                                        <p className="text-purple-300 mb-4">Gerencie seus produtos</p>
                                        <button
                                            onClick={() => setTela('meus-produtos')}
                                            className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 rounded-lg transition-all"
                                        >
                                            Acessar
                                        </button>
                                    </div>

                                    <div className="bg-slate-900/80 border border-green-400/30 rounded-xl p-6">
                                        <h3 className="text-xl font-bold text-green-400 mb-2">+ Novo Produto</h3>
                                        <p className="text-purple-300 mb-4">Crie um novo anúncio</p>
                                        <button
                                            onClick={() => setTela('novo-produto')}
                                            className="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-lg transition-all"
                                        >
                                            Criar
                                        </button>
                                    </div>
                                </div>

                                <div className="mt-8 bg-slate-900/80 border border-purple-400/30 rounded-xl p-6">
                                    <h3 className="text-xl font-bold text-purple-400 mb-4">📊 Produtos na Vitrine</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        {produtos.map(p => (
                                            <div key={p.id} className="bg-slate-800/50 border border-purple-400/20 rounded-lg p-4">
                                                <p className="text-2xl mb-2">{p.emoji}</p>
                                                <h4 className="font-bold text-cyan-400 mb-2">{p.nome}</h4>
                                                <p className="text-sm text-purple-300 mb-2">R$ {p.preco_anuncio}</p>
                                                <p className="text-xs text-gray-400">👁️ {p.visualizacoes} visualizações</p>
                                            </div>
                                        ))}

                                </div>
                            </div>
                        )}

                                    className="mb-4 text-cyan-400 hover:text-cyan-300 font-bold"

</html>
