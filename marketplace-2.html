<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 MarketHub</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #2d1b4e 100%);
            color: #e0e7ff;
        }
        #root { min-height: 100vh; }
        .navbar {
            background: linear-gradient(to right, #1e293b, #3f1d5e);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
        }
        .navbar-brand {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(to right, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        .login-box {
            max-width: 400px;
            margin: 60px auto;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        .login-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to right, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #06b6d4;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 8px;
            color: white;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(to right, #0ea5e9, #a855f7);
            color: white;
            width: 100%;
            margin-bottom: 16px;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger {
            background: #dc2626;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }
        .btn-danger:hover { background: #b91c1c; }
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            font-size: 12px;
            color: #93c5fd;
            text-align: left;
        }
        .banner {
            background: linear-gradient(to right, rgba(168, 85, 247, 0.2), rgba(6, 182, 212, 0.2));
            border: 2px solid #a855f7;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .banner h3 {
            font-size: 20px;
            color: #22d3ee;
            margin-bottom: 8px;
        }
        .banner p {
            color: #c084fc;
            margin-bottom: 12px;
        }
        .page-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(to right, #06b6d4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }
        .back-link {
            color: #06b6d4;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 24px;
            display: inline-block;
        }
        .back-link:hover { color: #22d3ee; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
        }
        .product-card:hover {
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.1);
        }
        .product-emoji { font-size: 48px; margin-bottom: 12px; }
        .product-name {
            font-weight: bold;
            color: #06b6d4;
            margin-bottom: 12px;
        }
        .product-price {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .product-price-main {
            font-size: 24px;
            font-weight: bold;
            color: #10b981;
        }
        .product-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .product-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: white;
            margin-bottom: 24px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            color: #06b6d4;
            margin-bottom: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-buttons button {
            flex: 1;
        }
        .btn-success {
            background: linear-gradient(to right, #10b981, #059669);
            color: white;
        }
        .btn-success:hover { opacity: 0.9; }
        .btn-secondary {
            background: #475569;
            color: white;
        }
        .btn-secondary:hover { background: #334155; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tela, setTela] = useState('login');
            const [usuario, setUsuario] = useState(null);
            const [email, setEmail] = useState('teste@test.com');
            const [senha, setSenha] = useState('123');
            const [busca, setBusca] = useState('');
            const [editando, setEditando] = useState(null);
            const [novoNome, setNovoNome] = useState('');

            const usuarios = {
                'teste@test.com': { id: '1', nome: '🧪 Teste Completo', email: 'teste@test.com', senha: '123' }
            };

            const [produtos, setProdutos] = useState([
                { id: 1, nome: '🍽️ Marmita', preco: 45, preco_min: 35, vendedor: '🧪 Teste Completo', views: 23, reducao: true, dias: 0 },
                { id: 2, nome: '📱 Smartphone', preco: 1200, preco_min: 800, vendedor: '🧪 Teste Completo', views: 156, reducao: false, dias: 0 },
                { id: 3, nome: '👕 Camiseta', preco: 89, preco_min: 45, vendedor: '🧪 Teste Completo', views: 89, reducao: true, dias: 10 },
                { id: 4, nome: '💡 Luminária', preco: 150, preco_min: 100, vendedor: '🧪 Teste Completo', views: 34, reducao: false, dias: 0 },
                { id: 5, nome: '⚽ Bola', preco: 120, preco_min: 80, vendedor: '🧪 Teste Completo', views: 67, reducao: true, dias: 5 }
            ]);

            const fazerLogin = () => {
                const u = usuarios[email];
                if (u && u.senha === senha) {
                    setUsuario(u);
                    setTela('inicio');
                } else {
                    alert('Email ou senha incorretos!\nTente: teste@test.com / 123');
                }
            };

            const sair = () => {
                setUsuario(null);
                setTela('login');
            };

            const deletar = (id) => {
                if (confirm('Deletar este produto?')) {
                    setProdutos(produtos.filter(p => p.id !== id));
                }
            };

            const editar = (p) => {
                setEditando(p);
                setNovoNome(p.nome);
            };

            const salvar = () => {
                if (!novoNome.trim()) return;
                setProdutos(produtos.map(p => p.id === editando.id ? { ...p, nome: novoNome } : p));
                setEditando(null);
            };

            if (!usuario) {
                return (
                    <div className="login-box">
                        <div className="login-title">💎 MarketHub</div>
                        <p style={{color: '#c084fc', marginBottom: '24px'}}>Marketplace Santa Rosa/RS</p>
                        
                        <div className="form-group">
                            <label className="form-label">Email</label>
                            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="form-input" />
                        </div>
                        
                        <div className="form-group">
                            <label className="form-label">Senha</label>
                            <input type="password" value={senha} onChange={(e) => setSenha(e.target.value)} className="form-input" />
                        </div>
                        
                        <button onClick={fazerLogin} className="btn btn-primary">🚀 Entrar</button>
                        
                        <div className="info-box">
                            <strong>🧪 TESTE:</strong><br/>
                            Email: teste@test.com<br/>
                            Senha: 123
                        </div>
                    </div>
                );
            }

            if (tela === 'inicio') {
                const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(busca.toLowerCase()));
                return (
                    <div>
                        <div className="navbar">
                            <div className="navbar-brand">💎 MarketHub</div>
                            <div>
                                <span style={{marginRight: '16px', color: '#06b6d4'}}>👤 {usuario.nome}</span>
                                <button onClick={sair} className="btn btn-danger">Sair</button>
                            </div>
                        </div>

                        <div className="container">
                            <div className="banner">
                                <h3>Bem-vindo ao MarketHub!</h3>
                                <p>Plataforma de marketplace inteligente</p>
                            </div>

                            <button onClick={() => setTela('meus-produtos')} className="btn btn-primary">📦 Meus Produtos</button>

                            <div className="page-title">🛍️ Produtos</div>

                            <input 
                                type="text" 
                                placeholder="🔍 Buscar..." 
                                value={busca} 
                                onChange={(e) => setBusca(e.target.value)} 
                                className="search-box" 
                            />

                            <div className="product-grid">
                                {filtrados.length > 0 ? filtrados.map(p => (
                                    <div key={p.id} className="product-card">
                                        <div className="product-emoji">{p.nome.split(' ')[0]}</div>
                                        <div className="product-name">{p.nome}</div>
                                        <div className="product-price">
                                            <div className="product-price-main">R$ {p.preco}</div>
                                            {p.reducao && <div style={{fontSize: '11px', color: '#22d3ee', marginTop: '4px'}}>📉 Dia {p.dias + 1}</div>}
                                        </div>
                                        <div style={{fontSize: '12px', color: '#94a3b8', marginBottom: '12px'}}>
                                            👁️ {p.views} views<br/>
                                            👤 {p.vendedor}
                                        </div>
                                        <button className="btn btn-secondary" style={{width: '100%'}}>💬 Negociar</button>
                                    </div>
                                )) : <div>Nenhum produto encontrado</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            if (tela === 'meus-produtos') {
                return (
                    <div>
                        <div className="navbar">
                            <div className="navbar-brand">💎 MarketHub</div>
                            <div>
                                <span style={{marginRight: '16px', color: '#06b6d4'}}>👤 {usuario.nome}</span>
                                <button onClick={sair} className="btn btn-danger">Sair</button>
                            </div>
                        </div>

                        <div className="container">
                            <span className="back-link" onClick={() => setTela('inicio')}>← Voltar</span>

                            <div className="page-title">📦 Meus Produtos ({produtos.length})</div>

                            <div className="product-grid">
                                {produtos.map(p => (
                                    <div key={p.id} className="product-card">
                                        <div className="product-emoji">{p.nome.split(' ')[0]}</div>
                                        <div className="product-name">{p.nome}</div>
                                        <div className="product-price">
                                            <div style={{fontSize: '12px', color: '#94a3b8'}}>Original: R$ {p.preco}</div>
                                            <div className="product-price-main">R$ {p.preco_min}</div>
                                            {p.reducao && <div style={{fontSize: '11px', color: '#22d3ee', marginTop: '4px'}}>✅ Redução: -{p.dias}%</div>}
                                        </div>
                                        <div style={{fontSize: '12px', color: '#94a3b8', marginBottom: '12px'}}>
                                            👁️ {p.views} views
                                        </div>
                                        <div className="product-buttons">
                                            <button onClick={() => editar(p)} className="btn btn-primary">✏️ Editar</button>
                                            <button onClick={() => deletar(p.id)} className="btn btn-danger">🗑️ Deletar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {editando && (
                            <div className="modal" onClick={() => setEditando(null)}>
                                <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                    <div className="modal-title">✏️ Editar</div>
                                    <div className="form-group">
                                        <label className="form-label">Nome</label>
                                        <input type="text" value={novoNome} onChange={(e) => setNovoNome(e.target.value)} className="form-input" />
                                    </div>
                                    <div className="modal-buttons">
                                        <button onClick={salvar} className="btn btn-success">💾 Salvar</button>
                                        <button onClick={() => setEditando(null)} className="btn btn-secondary">❌ Cancelar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
